<!-- Cole este trecho dentro da sua <main> (logo abaixo do header) para mostrar o pote -->
<div id="banner-pote" class="mb-8 bg-green-900 p-6 rounded-2xl shadow-xl text-center text-white">
    <h3 class="text-green-200 text-sm font-semibold uppercase tracking-widest">Prêmio Acumulado (Já com 20% da Banca)</h3>
    <div id="valor-pote" class="text-4xl font-extrabold mt-2">R$ 0,00</div>
    <p class="text-xs text-green-300 mt-1">*Valor líquido para os ganhadores</p>
</div>

<!-- No seu formulário de palpite, adicione este campo de pagamento -->
<div class="mt-4">
    <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Forma de Pagamento</label>
    <div class="flex gap-4">
        <label class="flex items-center gap-2 border p-3 rounded-lg flex-1 cursor-pointer hover:bg-gray-50">
            <input type="radio" name="pagamento" value="pix" checked> Pix
        </label>
        <label class="flex items-center gap-2 border p-3 rounded-lg flex-1 cursor-pointer hover:bg-gray-50">
            <input type="radio" name="pagamento" value="especie"> Espécie
        </label>
    </div>
</div>

<script>
// A nova função que calcula o pote vivo
async function atualizarPoteTotal() {
    const { data: palpites } = await _supabase.from('palpites').select('*, jogos(valor_aposta)').eq('pago', true);
    
    let totalLiquido = 0;
    if (palpites) {
        palpites.forEach(p => {
            const valor = p.jogos ? p.jogos.valor_aposta : 10;
            // Cálculo: Valor do palpite - 20% da banca
            totalLiquido += (valor * 0.80);
        });
    }
    document.getElementById('valor-pote').innerText = `R$ ${totalLiquido.toFixed(2)}`;
}

// Chame esta função toda vez que carregar a tela
async function init() {
    await carregarJogosUser();
    await carregarJogosAdmin();
    await carregarPalpitesAdmin();
    await atualizarPoteTotal(); // Nova função ativada
}
</script>
