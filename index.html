<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Bolão Pro - CRUD Completo</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">

    <div class="max-w-4xl mx-auto bg-white p-8 rounded shadow">
        <h1 class="text-2xl font-bold mb-6">Painel de Administração</h1>

        <div class="mb-10">
            <h2 class="text-xl font-semibold mb-4">Gerenciar Jogos</h2>
            <div id="lista-jogos" class="space-y-2"></div>
        </div>

        <div>
            <h2 class="text-xl font-semibold mb-4">Gerenciar Palpites</h2>
            <div id="lista-palpites" class="space-y-2"></div>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient("SUA_URL", "SUA_KEY");

        // --- READ ---
        async function carregarDados() {
            const { data: jogos } = await _supabase.from('jogos').select('*');
            const { data: palpites } = await _supabase.from('palpites').select('*, jogos(time_a, time_b)');

            document.getElementById('lista-jogos').innerHTML = jogos.map(j => `
                <div class="flex gap-2 items-center p-2 border">
                    <input type="text" value="${j.time_a}" id="a-${j.id}" class="border p-1 w-20">
                    <span>x</span>
                    <input type="text" value="${j.time_b}" id="b-${j.id}" class="border p-1 w-20">
                    <button onclick="atualizarJogo(${j.id})" class="bg-green-500 text-white px-2 py-1 rounded">Salvar</button>
                    <button onclick="deletar('jogos', ${j.id})" class="bg-red-500 text-white px-2 py-1 rounded">Excluir</button>
                </div>
            `).join('');

            document.getElementById('lista-palpites').innerHTML = palpites.map(p => `
                <div class="flex gap-2 items-center p-2 border">
                    <span>${p.nome}:</span>
                    <input type="number" value="${p.palpite_a}" id="ga-${p.id}" class="w-12 border">
                    <input type="number" value="${p.palpite_b}" id="gb-${p.id}" class="w-12 border">
                    <button onclick="atualizarPalpite(${p.id})" class="bg-blue-500 text-white px-2 py-1 rounded">Salvar</button>
                    <button onclick="deletar('palpites', ${p.id})" class="bg-red-500 text-white px-2 py-1 rounded">Excluir</button>
                </div>
            `).join('');
        }

        // --- UPDATE ---
        async function atualizarJogo(id) {
            const time_a = document.getElementById(`a-${id}`).value;
            const time_b = document.getElementById(`b-${id}`).value;
            await _supabase.from('jogos').update({ time_a, time_b }).eq('id', id);
            alert("Jogo atualizado!");
        }

        async function atualizarPalpite(id) {
            const palpite_a = document.getElementById(`ga-${id}`).value;
            const palpite_b = document.getElementById(`gb-${id}`).value;
            await _supabase.from('palpites').update({ palpite_a, palpite_b }).eq('id', id);
            alert("Palpite atualizado!");
        }

        // --- DELETE ---
        async function deletar(tabela, id) {
            if(confirm("Confirma exclusão?")) {
                await _supabase.from(tabela).delete().eq('id', id);
                carregarDados();
            }
        }

        window.onload = carregarDados;
    </script>
</body>
</html>
