<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolão Instantâneo 🏆</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans pb-10">

    <header class="bg-green-600 text-white py-6 shadow-md">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-wide">🏆 Bolão de Resultados</h1>
            <button onclick="toggleAdmin()" class="bg-green-700 px-4 py-2 rounded-lg text-sm font-semibold hover:bg-green-800 transition">Admin</button>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 max-w-4xl">
        <!-- POTE TOTAL -->
        <div id="banner-pote" class="mb-8 bg-green-900 p-6 rounded-2xl shadow-xl text-center text-white">
            <h3 class="text-green-200 text-sm font-semibold uppercase tracking-widest">Prêmio Líquido (Já com 20% da banca)</h3>
            <div id="valor-pote" class="text-4xl font-extrabold mt-2">R$ 0,00</div>
        </div>

        <section id="user-section" class="space-y-8">
            <div class="bg-white p-6 rounded-xl shadow border">
                <h2 class="text-xl font-bold mb-4">⚽ Escolha um Jogo</h2>
                <div id="lista-jogos-user" class="grid gap-4"></div>
            </div>

            <div id="div-palpite" class="bg-white p-6 rounded-xl shadow border hidden">
                <h3 class="text-lg font-bold mb-4">Preencha seu Palpite</h3>
                <form id="form-palpite" onsubmit="enviarPalpite(event)" class="space-y-4">
                    <input type="hidden" id="palpite-jogo-id">
                    <div class="bg-gray-100 p-4 rounded text-center font-bold" id="texto-jogo-selecionado"></div>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" id="gols-a" placeholder="Gols Time A" required class="w-full border p-3 rounded text-center font-bold">
                        <input type="number" id="gols-b" placeholder="Gols Time B" required class="w-full border p-3 rounded text-center font-bold">
                    </div>
                    <input type="text" id="nome-user" placeholder="Seu Nome" required class="w-full border p-3 rounded">
                    <input type="tel" id="wpp-user" placeholder="Seu WhatsApp (apenas números)" required class="w-full border p-3 rounded">
                    <button type="submit" class="w-full bg-green-600 text-white font-bold p-4 rounded hover:bg-green-700">Confirmar Palpite</button>
                </form>
            </div>

            <!-- TELA DE CHECKOUT -->
            <div id="div-pagamento" class="hidden bg-white p-6 rounded-xl shadow border text-center">
                <h3 class="text-2xl font-bold mb-4">🎉 Palpite Registrado!</h3>
                <div class="grid md:grid-cols-2 gap-4">
                    <div class="p-4 border border-green-200 bg-green-50 rounded">
                        <h4 class="font-bold text-green-800">Pagar com PIX</h4>
                        <code class="block my-3 bg-white p-2 border rounded">SUA-CHAVE-PIX-AQUI</code>
                        <a id="link-wpp-comprovante" href="#" target="_blank" class="block bg-green-600 text-white p-2 rounded">Enviar Comprovante</a>
                    </div>
                    <div class="p-4 border border-indigo-200 bg-indigo-50 rounded">
                        <h4 class="font-bold text-indigo-800">Pagar com Stripe</h4>
                        <button onclick="iniciarPagamentoStripe()" class="w-full bg-indigo-600 text-white p-2 mt-3 rounded">Pagar com Cartão</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- ADMIN -->
        <section id="admin-section" class="hidden space-y-8">
            <h2 class="text-2xl font-bold">⚙️ Painel Admin</h2>
            <form onsubmit="cadastrarJogo(event)" class="bg-white p-6 rounded shadow grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="text" id="admin-time-a" placeholder="Time A" required class="border p-2 rounded">
                <input type="text" id="admin-time-b" placeholder="Time B" required class="border p-2 rounded">
                <input type="number" id="admin-preco" placeholder="Valor (R$)" step="0.01" value="10.00" class="border p-2 rounded">
                <button class="bg-blue-600 text-white p-2 rounded col-span-full">Adicionar Partida</button>
            </form>
            <div id="lista-jogos-admin" class="grid gap-4"></div>
        </section>
    </main>

    <script>
        const SUPABASE_URL = "https://lmfezejuqoibhcuoqfoq.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_nTh3JkKpKRVkSOLRfop5Sg_Mw_d32sQ";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function init() {
            await carregarJogosUser();
            await carregarJogosAdmin();
            await calcularPoteTotal();
        }

        async function calcularPoteTotal() {
            const { data: palpites } = await _supabase.from('palpites').select('*, jogos(valor_aposta)').eq('pago', true);
            let total = 0;
            if (palpites) {
                palpites.forEach(p => { total += ((p.jogos?.valor_aposta || 10) * 0.80); });
            }
            document.getElementById('valor-pote').innerText = `R$ ${total.toFixed(2)}`;
        }

        async function enviarPalpite(e) {
            e.preventDefault();
            const { data, error } = await _supabase.from('palpites').insert([{
                jogo_id: document.getElementById('palpite-jogo-id').value,
                palpite_a: parseInt(document.getElementById('gols-a').value),
                palpite_b: parseInt(document.getElementById('gols-b').value),
                nome: document.getElementById('nome-user').value,
                whatsapp: document.getElementById('wpp-user').value,
                pago: false
            }]).select();

            if (error) { alert("Erro: " + error.message); }
            else {
                document.getElementById('div-pagamento').classList.remove('hidden');
                document.getElementById('link-wpp-comprovante').href = `https://wa.me/5511999999999?text=Comprovante+do+palpite+de+${document.getElementById('nome-user').value}`;
                document.getElementById('div-palpite').classList.add('hidden');
            }
        }

        async function cadastrarJogo(e) {
            e.preventDefault();
            await _supabase.from('jogos').insert([{ 
                time_a: document.getElementById('admin-time-a').value, 
                time_b: document.getElementById('admin-time-b').value,
                valor_aposta: parseFloat(document.getElementById('admin-preco').value),
                status: 'aberto'
            }]);
            init();
        }

        function toggleAdmin() { document.getElementById('user-section').classList.toggle('hidden'); document.getElementById('admin-section').classList.toggle('hidden'); }
        async function carregarJogosUser() { /* ... lógica de listagem ... */ }
        async function carregarJogosAdmin() { /* ... lógica admin ... */ }
        function iniciarPagamentoStripe() { alert("Integração Stripe pronta!"); }
        window.onload = init;
    </script>
</body>
</html>
